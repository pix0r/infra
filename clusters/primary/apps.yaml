# Top-level Flux Kustomization for the apps layer.
# Depends on cert-manager so Ingress certs can issue immediately on first reconcile.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  path: ./clusters/primary/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-cert-manager
  wait: true
