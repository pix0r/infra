# PLACEHOLDER — fill in real AWS IAM creds, then run:
#   sops -e -i secret.enc.yaml
# before committing. Flux will decrypt at reconcile time using the
# sops-age secret in flux-system namespace.
#
# The IAM user must have these permissions on the matz.io hosted zone:
#   - route53:GetChange
#   - route53:ChangeResourceRecordSets
#   - route53:ListHostedZonesByName
#
# Reuse matz-infra-tofu if you scope its policy, or create a new
# matz-infra-cert-manager user. Do NOT use long-lived admin creds.
apiVersion: v1
kind: Secret
metadata:
  name: route53-credentials
  namespace: cert-manager
type: Opaque
stringData:
  access-key-id: REPLACE_ME_AWS_ACCESS_KEY_ID
  secret-access-key: REPLACE_ME_AWS_SECRET_ACCESS_KEY
