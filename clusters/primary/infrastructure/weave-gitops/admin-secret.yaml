# Dashboard admin login. The chart expects a bcrypt hash, NOT a plaintext password.
# Generate with:
#   PASS=$(openssl rand -base64 24)
#   HASH=$(gitops get bcrypt-hash "$PASS")     # or: htpasswd -bnBC 10 "" "$PASS" | tr -d ':\n' | sed 's/$2y/$2a/'
# Then run `sops -e -i admin-secret.yaml` before committing.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-user-auth
  namespace: weave-gitops
type: Opaque
stringData:
  username: admin
  password: REPLACE_ME_BCRYPT_HASH
