# Let's Encrypt production issuer using DNS-01 against the matz.io Route53 zone.
# Replace REPLACE_ME_ROUTE53_ZONE_ID with the hosted zone ID before committing
# (matches TF_VAR_route53_zone_id in secrets/terraform.env).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mike@pixor.net
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - selector:
          dnsZones:
            - matz.io
        dns01:
          route53:
            region: us-east-1
            hostedZoneID: REPLACE_ME_ROUTE53_ZONE_ID
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
