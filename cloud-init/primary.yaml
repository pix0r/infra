#cloud-config

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - fail2ban
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - jq

# Harden SSH
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      MaxAuthTries 3
      X11Forwarding no

  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      maxretry = 3
      bantime = 3600

  # Forgejo docker-compose
  - path: /opt/forgejo/docker-compose.yaml
    content: |
      services:
        forgejo:
          image: codeberg.org/forgejo/forgejo:9
          container_name: forgejo
          restart: always
          environment:
            - USER_UID=1000
            - USER_GID=1000
            - FORGEJO__server__ROOT_URL=https://${forgejo_fqdn}
            - FORGEJO__server__SSH_DOMAIN=${forgejo_fqdn}
            - FORGEJO__server__HTTP_PORT=3000
            - FORGEJO__service__DISABLE_REGISTRATION=true
          volumes:
            - forgejo-data:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
          ports:
            - "3000:3000"
            - "2222:22"
          networks:
            - forgejo

      volumes:
        forgejo-data:

      networks:
        forgejo:

runcmd:
  # Enable fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - dpkg-reconfigure -f noninteractive unattended-upgrades

  # Install Docker via official script
  - curl -fsSL https://get.docker.com | sh

  # Start Forgejo
  - cd /opt/forgejo && docker compose up -d

  # Install Coolify (their official installer)
  - curl -fsSL https://cdn.coollabs.io/coolify/install.sh | bash

  # Restart SSH with hardened config
  - systemctl restart sshd

  # Signal completion
  - touch /var/log/cloud-init-complete
