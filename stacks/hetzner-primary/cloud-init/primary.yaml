#cloud-config

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - fail2ban
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - jq

# Harden SSH
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      MaxAuthTries 3
      X11Forwarding no

  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      maxretry = 3
      bantime = 3600

runcmd:
  # Enable fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - dpkg-reconfigure -f noninteractive unattended-upgrades

  # Install Docker via official script (kept for ad-hoc container work; k3s uses containerd)
  - curl -fsSL https://get.docker.com | sh

  # Install k3s (single-node, server). Pin a specific channel to avoid surprise upgrades.
  - curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL=stable INSTALL_K3S_VERSION=v1.31.4+k3s1 sh -

  # Make kubeconfig usable for root
  - mkdir -p /root/.kube
  - cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
  - chmod 600 /root/.kube/config

  # Install flux CLI
  - curl -s https://fluxcd.io/install.sh | bash

  # Install kubectl + helm + k9s for ergonomics
  - snap install kubectl --classic
  - snap install helm --classic
  - snap install k9s

  # Bootstrap Flux against pix0r/infra. The PAT is template-substituted by Terraform
  # from var.flux_github_pat (sourced from SOPS-encrypted secrets/terraform.env).
  - export GITHUB_TOKEN=${flux_github_pat}
  - flux bootstrap github --owner=pix0r --repository=infra --path=clusters/primary --personal --branch=main --token-auth

  # Restart SSH with hardened config
  - systemctl restart sshd

  # Signal completion
  - touch /var/log/cloud-init-complete
