name: Terraform Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Plan changes in changed stacks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Check Terramate formatting
        run: terramate fmt --check

      - name: Check OpenTofu formatting
        run: tofu fmt -recursive -check -diff

      - name: Generate Terramate code
        run: terramate generate

      - name: List changed stacks
        id: list
        run: terramate list --changed

      - name: Initialize OpenTofu in changed stacks
        if: steps.list.outputs.stdout
        run: |
          terramate run \
            --changed \
            -- \
            tofu init -lock-timeout=5m

      - name: Plan changes in changed stacks
        if: steps.list.outputs.stdout
        id: plan
        run: |
          terramate run \
            --changed \
            --continue-on-error \
            -- \
            tofu plan -out out.otplan -detailed-exitcode -lock=false \
              -var="hcloud_token=$HCLOUD_TOKEN" \
              -var="aws_profile=" \
              -var="route53_zone_id=$ROUTE53_ZONE_ID" \
              -var="domain=matz.io"
        env:
          ROUTE53_ZONE_ID: ${{ secrets.ROUTE53_ZONE_ID }}

      - name: Comment plan on PR
        if: steps.list.outputs.stdout
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let output = '';
            try {
              output = execSync('terramate run --changed -- tofu show -no-color out.otplan', {
                env: { ...process.env },
                encoding: 'utf-8',
                maxBuffer: 1024 * 1024
              });
            } catch (e) {
              output = e.stdout || 'Failed to generate plan output';
            }

            const body = `### 📋 Terraform Plan

            \`\`\`
            ${output.substring(0, 60000)}
            \`\`\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### 📋 Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
