name: Terraform Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Plan changes in changed stacks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install SOPS
        uses: nhedger/setup-sops@v2
        with:
          version: 3.10.2

      - name: Decrypt secrets and export to environment
        # Single source of truth: secrets/terraform.env (SOPS-encrypted, committed).
        # Same file is consumed by local fast-loop via `sops exec-env`.
        # Mirrors values into $GITHUB_ENV so subsequent steps see them as plain env vars.
        run: |
          umask 077
          echo "${{ secrets.SOPS_AGE_KEY }}" > /tmp/age.key
          export SOPS_AGE_KEY_FILE=/tmp/age.key
          sops -d --output-type=dotenv secrets/terraform.env > /tmp/decrypted.env
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" == \#* ]] && continue
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done < /tmp/decrypted.env
          rm -f /tmp/decrypted.env /tmp/age.key

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: 0.14.0

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.10.6
          tofu_wrapper: false

      - name: Check Terramate formatting
        run: terramate fmt --check

      - name: Check OpenTofu formatting
        run: tofu fmt -recursive -check -diff

      - name: Generate Terramate code
        run: terramate generate

      - name: List changed stacks
        id: list
        run: terramate list --changed

      - name: Initialize OpenTofu in changed stacks
        if: steps.list.outputs.stdout
        run: |
          terramate run \
            --changed \
            -- \
            tofu init -lock-timeout=5m

      - name: Plan changes in changed stacks
        if: steps.list.outputs.stdout
        id: plan
        # All vars come from env — TF_VAR_* auto-bind, AWS_* picked up by provider.
        # Decrypt step above exported them from secrets/terraform.env.
        run: |
          terramate run \
            --changed \
            --continue-on-error \
            -- \
            tofu plan -out out.otplan -detailed-exitcode -lock=false

      - name: Comment plan on PR
        if: steps.list.outputs.stdout
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let output = '';
            try {
              output = execSync('terramate run --changed -- tofu show -no-color out.otplan', {
                env: { ...process.env },
                encoding: 'utf-8',
                maxBuffer: 1024 * 1024
              });
            } catch (e) {
              output = e.stdout || 'Failed to generate plan output';
            }

            const body = `### 📋 Terraform Plan

            \`\`\`
            ${output.substring(0, 60000)}
            \`\`\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### 📋 Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
